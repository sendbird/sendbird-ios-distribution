name: Private Spec Publisher

on:
  workflow_dispatch:
    inputs:
      pod_name:
        description: Pod name expected in the submitted podspec
        required: true
        type: string
      version:
        description: Pod version expected in the submitted podspec
        required: true
        type: string
      podspec_base64:
        description: Base64-encoded generated podspec
        required: true
        type: string
      dry_run:
        description: Validate only; do not branch, commit, push, or open a PR
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private spec source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install CocoaPods
        run: gem install cocoapods -N

      - name: Decode submitted podspec
        env:
          PODSPEC_BASE64: ${{ inputs.podspec_base64 }}
        run: |
          printf '%s' "$PODSPEC_BASE64" | base64 --decode > submitted.podspec

      - name: Validate submitted podspec
        id: validate
        env:
          POD_NAME: ${{ inputs.pod_name }}
          VERSION: ${{ inputs.version }}
        run: |
          ruby <<'RUBY'
          require "json"
          require "open3"

          podspec_path = "submitted.podspec"
          expected_name = ENV.fetch("POD_NAME")
          expected_version = ENV.fetch("VERSION")

          stdout, stderr, status = Open3.capture3("pod", "ipc", "spec", podspec_path)
          abort("podspec parse failed:\n#{stderr}") unless status.success?

          spec = JSON.parse(stdout)
          pod_name = spec.fetch("name").to_s
          version = spec.fetch("version").to_s
          safe_segment = /\A[A-Za-z0-9][A-Za-z0-9_.+-]*\z/

          abort("invalid pod name: #{pod_name.inspect}") unless pod_name.match?(safe_segment)
          abort("invalid version: #{version.inspect}") unless version.match?(safe_segment)
          abort("pod name mismatch: requested #{expected_name.inspect}, parsed #{pod_name.inspect}") unless expected_name == pod_name
          abort("version mismatch: requested #{expected_version.inspect}, parsed #{version.inspect}") unless expected_version == version

          destination = "Specs/#{pod_name}/#{version}/#{pod_name}.podspec"

          File.open(ENV.fetch("GITHUB_OUTPUT"), "a") do |file|
            file.puts("pod_name=#{pod_name}")
            file.puts("version=#{version}")
            file.puts("destination=#{destination}")
          end

          puts "pod: #{pod_name}"
          puts "version: #{version}"
          puts "destination: #{destination}"
          RUBY

      - name: Prepare publish branch
        if: ${{ !inputs.dry_run }}
        env:
          POD_NAME: ${{ steps.validate.outputs.pod_name }}
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          set -euo pipefail
          branch="private-spec/${POD_NAME}-${VERSION}"

          git fetch origin main
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            git fetch origin "$branch:$branch"
            git switch "$branch"
            git rebase origin/main
          else
            git switch -c "$branch" origin/main
          fi

          echo "PUBLISH_BRANCH=$branch" >> "$GITHUB_ENV"

      - name: Publish private spec
        if: ${{ !inputs.dry_run }}
        id: publish
        env:
          DESTINATION: ${{ steps.validate.outputs.destination }}
        run: |
          mkdir -p "$(dirname "$DESTINATION")"
          cp submitted.podspec "$DESTINATION"
          echo "destination=$DESTINATION" >> "$GITHUB_OUTPUT"

      - name: Commit and push private spec
        if: ${{ !inputs.dry_run }}
        env:
          DESTINATION: ${{ steps.publish.outputs.destination }}
          POD_NAME: ${{ steps.validate.outputs.pod_name }}
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -z "$(git status --porcelain -- "$DESTINATION")" ]]; then
            echo "No private spec changes to commit."
            exit 0
          fi

          git add "$DESTINATION"
          git commit -m "Publish ${POD_NAME} ${VERSION} private spec"
          git push --set-upstream origin "$PUBLISH_BRANCH"

      - name: Open or update private spec PR
        id: pull_request
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
          DESTINATION: ${{ steps.publish.outputs.destination }}
          POD_NAME: ${{ steps.validate.outputs.pod_name }}
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          set -euo pipefail

          if git diff --quiet origin/main...HEAD; then
            echo "No branch diff against main; skipping PR creation."
            exit 0
          fi

          if pr_url=$(gh pr view "$PUBLISH_BRANCH" --json url --jq .url 2>/dev/null); then
            echo "Updated existing PR: $pr_url"
          else
            pr_url=$(gh pr create \
              --base main \
              --head "$PUBLISH_BRANCH" \
              --title "Publish ${POD_NAME} ${VERSION} private spec" \
              --body "Publishes \`${DESTINATION}\` through the reusable private spec publisher.")
          fi

          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
